<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QBO Demo Manager{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236d2482'/><text x='16' y='22' font-family='Inter,sans-serif' font-size='16' font-weight='700' fill='white' text-anchor='middle'>Q</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg width="22" height="22" viewBox="0 0 32 32" style="vertical-align: -3px; margin-right: 6px"><rect width="32" height="32" rx="6" fill="#6d2482"/><text x="16" y="22" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Q</text></svg><span>QBO</span> Demo Manager
            </h1>
            <div class="header-actions">
                {% block header_actions %}{% endblock %}
            </div>
        </header>
        {% block content %}{% endblock %}
    </div>
    <script>
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.color = '#22c55e';
                setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
            });
        }

        function startCountdown(el, seconds) {
            let remaining = seconds;
            const update = () => {
                el.textContent = remaining + 's';
                if (remaining <= 5) el.classList.add('urgent');
                if (remaining <= 0) {
                    el.textContent = 'Expired — refresh';
                    return;
                }
                remaining--;
                setTimeout(update, 1000);
            };
            update();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QBO Demo Manager — QuickBooks Online{% endblock %}</title>
    <link rel="icon" href="/static/qb-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-brand">
                <img src="/static/qb-icon.svg" width="34" height="34" alt="QuickBooks">
                <div class="header-brand-text">
                    <h1><span>QBO</span> Demo Manager</h1>
                    <span class="header-subtitle">QuickBooks Online</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    {% block header_actions %}{% endblock %}
                </div>
                <span class="tbx-wordmark">
                    <img src="/static/tbx-icon.svg" width="20" height="20" alt="TestBox">
                    TestBox
                </span>
            </div>
        </header>
        {% block content %}{% endblock %}

        <footer class="site-footer">
            <span class="footer-brand footer-brand-tbx">
                <img src="/static/tbx-icon.svg" width="18" height="18" alt="TestBox">
                TestBox Platform
            </span>
            <span class="footer-sep">&middot;</span>
            <span class="footer-brand">
                <img src="/static/qb-icon.svg" width="16" height="16" alt="QuickBooks">
                Intuit QuickBooks Online
            </span>
        </footer>
    </div>
    <script>
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.color = '#22c55e';
                setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
            });
        }

        function startCountdown(el, seconds) {
            let remaining = seconds;
            const update = () => {
                el.textContent = remaining + 's';
                if (remaining <= 5) el.classList.add('urgent');
                if (remaining <= 0) {
                    el.textContent = 'Expired — refresh';
                    return;
                }
                remaining--;
                setTimeout(update, 1000);
            };
            update();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
